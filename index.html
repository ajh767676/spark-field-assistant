<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark Field Assistant</title>



  <style>
    .inspection-item.complete {
      background: #dcfce7;
      color: #166534;
    }
    .inspection-list {
      display: grid;
      gap: 12px;
      margin: 18px 0;
    }

    .inspection-item {
      background: #f3f4f6;
      color: var(--text);
      text-align: left;
      padding: 18px;
      border-radius: 14px;
      font-size: 17px;
    }
    :root {
      --navy: #101827;
      --orange: #e65a00;
      --light: #f7f4ef;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--light);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--navy);
      color: white;
      padding: 45px 18px;
      text-align: center;
      border-bottom: 3px solid var(--orange);
    }

    .brand-logo {
      width: 150px;
      height: auto;
      display: block;
      margin: 0 auto 20px;
    }

    .logo {
      color: var(--orange);
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 14px;
    }

    h1 {
      font-size: 42px;
      margin: 12px 0;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 18px;
      margin-top: 10px;
    }

    main {
      flex: 1;
      padding: 18px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .primary {
      background: var(--orange);
      color: white;
    }

    .secondary {
      background: #111827;
      color: white;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-top: 18px;
    }

    .bottom-bar {
      position: sticky;
      bottom: 0;
      background: var(--navy);
      color: white;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total {
      font-size: 22px;
      font-weight: bold;
      color: var(--orange);
    }

    .screen-label {
      color: var(--orange);
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 13px;
      text-transform: uppercase;
      margin: 0 0 8px;
    }

    h2 {
      margin: 0 0 18px;
      font-size: 26px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: #f3f4f6;
      border-radius: 14px;
      padding: 16px;
    }

    .stat-label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-card strong {
      font-size: 24px;
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <img src="assets/images/spark-logo.png" alt="Spark Homes Logo" class="brand-logo" />

      <h1>Spark Field Assistant</h1>
      <p class="subtitle">Fast repair estimates for property walkthroughs</p>
    </header>

    <main>
      <section class="card">
        <label for="propertyName">Property Address</label>
        <input id="propertyName" type="text" placeholder="Example: 123 Main Street" />

        <button class="primary" onclick="startWalkthrough()">Start Guided Walkthrough</button>
        <button class="secondary">Open Saved Projects</button>

        <p class="hint">
          Built for agents walking properties in the field. Big buttons, fast totals,
          offline-first design, and a guided workflow instead of a spreadsheet.
        </p>
      </section>
    </main>

    <div class="bottom-bar">
      <span>Estimated Repairs</span>
      <span class="total">$0</span>
    </div>
  </div>

<script>
  let currentScreen = "home";

  const appData = {
    currentProject: null,
    exteriorChecklist: {
        Roof: false,
        Gutters: false,
        Siding: false,
        Windows: false,
        Garage: false,
        Trees: false
  }
};

  function startWalkthrough() {
    const propertyName = document.getElementById("propertyName").value.trim();

    if (!propertyName) {
      alert("Enter a property address first.");
      return;
    }

    appData.currentProject = {
      id: Date.now(),
      address: propertyName,
      repairTotal: 0,
      progress: 0,
      createdAt: new Date().toISOString()
    };

    localStorage.setItem(
      "currentProject",
      JSON.stringify(appData.currentProject)
    );

    showDashboard();
  }

  function showDashboard() {
    currentScreen = "dashboard";

    document.querySelector("main").innerHTML = `
      <section class="card">
        <p class="screen-label">Current Property</p>
        <h2>${appData.currentProject.address}</h2>

        <div class="stat-grid">
          <div class="stat-card">
            <span class="stat-label">Repair Total</span>
            <strong>$0</strong>
          </div>

          <div class="stat-card">
            <span class="stat-label">Progress</span>
            <strong>0%</strong>
          </div>
        </div>

        <button class="primary" onclick="showExteriorInspection()">Begin Exterior Inspection</button>
        <button class="secondary">Open Deal Analyzer</button>
      </section>
    `;

    document.querySelector(".bottom-bar .total").textContent = "$0";
  }

  function toggleExteriorItem(itemName) {
    appData.exteriorChecklist[itemName] = !appData.exteriorChecklist[itemName];
    showExteriorInspection();
  }

  function showExteriorInspection() {
  currentScreen = "exterior";

  const items = Object.keys(appData.exteriorChecklist);
  const completed = items.filter(item => appData.exteriorChecklist[item]).length;

  document.querySelector("main").innerHTML = `
    <section class="card">
      <p class="screen-label">Exterior Inspection</p>
      <h2>${appData.currentProject.address}</h2>

      <div class="inspection-list">
        ${items.map(item => `
          <button 
            class="inspection-item ${appData.exteriorChecklist[item] ? "complete" : ""}"
            onclick="toggleExteriorItem('${item}')"
          >
            ${appData.exteriorChecklist[item] ? "✅" : "⬜"} ${item}
          </button>
        `).join("")}
      </div>

      <p class="hint">Progress: ${completed} / ${items.length} complete</p>

      <button class="secondary" onclick="showDashboard()">Save & Return to Dashboard</button>
    </section>
  `;
}
</script>  
</body>
</html>
